<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Make Your Wish | 6-7 Wish</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','GA_MEASUREMENT_ID');</script>

<!-- Meta Pixel — Purchase event -->
<script>
!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
fbq('init','META_PIXEL_ID');

var params=new URLSearchParams(window.location.search);
fbq('track','Purchase',{value:parseFloat(params.get('amount')||'3'),currency:'USD'});

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(ellipse at 50% 0%,#1a3a7a 0%,#0D1B3D 42%,#060E22 100%);
  color:#fff;font-family:'Crimson Text',Georgia,serif;
  min-height:100vh;overflow-x:hidden;
}
canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
#top-border{position:fixed;top:0;left:0;right:0;z-index:100;height:6px;
  background:linear-gradient(90deg,transparent,#5a3800,#C89A18,#FFD700,#FFE860,#FFD700,#C89A18,#5a3800,transparent);
  box-shadow:0 0 20px rgba(212,175,55,.7)}
#flash{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;
  background:radial-gradient(circle at 50% 40%,rgba(255,215,0,.9),transparent 70%)}

/* SCREENS */
.screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;text-align:center}
.screen.active{display:flex}

/* SCREEN 1 — WISH FORM */
#screen-form{}
.form-logo{width:90px;height:90px;border-radius:50%;overflow:hidden;background:#1a1008;
  box-shadow:0 0 0 3px rgba(200,154,24,.7),0 0 28px rgba(212,175,55,.9);
  margin:0 auto 1rem;animation:logoFloat 3s ease-in-out infinite}
.form-logo img{width:100%;height:100%;object-fit:cover;filter:brightness(1.12) saturate(1.15)}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.form-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,4vw,1.8rem);font-weight:900;
  background:linear-gradient(180deg,#fff9d0,#FFD700 40%,#B88A10);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.5rem}
.form-sub{color:rgba(255,255,255,.65);font-style:italic;font-size:clamp(.88rem,2.5vw,1.05rem);
  margin-bottom:1.8rem;line-height:1.6;max-width:480px}
.form-box{
  background:linear-gradient(135deg,rgba(13,27,61,.97),rgba(30,77,154,.22));
  border:2px solid rgba(212,175,55,.45);border-radius:18px;
  padding:1.8rem 1.5rem;max-width:420px;width:100%;position:relative;overflow:hidden;
  box-shadow:0 0 60px rgba(212,175,55,.15)
}
.form-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#FFD700,transparent)}
.field-label{display:block;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;
  text-transform:uppercase;color:rgba(212,175,55,.8);margin-bottom:.4rem;text-align:left}
.field-input{display:block;width:100%;background:rgba(6,14,34,.88);
  border:1.5px solid rgba(212,175,55,.35);border-radius:9px;
  color:#fff;font-family:'Crimson Text',serif;font-size:.95rem;
  padding:.68rem .92rem;outline:none;margin-bottom:.9rem;
  transition:border-color .2s}
.field-input:focus{border-color:#FFD700}
.field-input::placeholder{color:rgba(255,255,255,.28);font-style:italic}
textarea.field-input{resize:none;line-height:1.55}
.char-count{text-align:right;font-size:.62rem;color:rgba(255,255,255,.25);
  margin-top:-.7rem;margin-bottom:.9rem}
.btn-send{display:block;width:100%;padding:1rem;
  background:linear-gradient(135deg,#6a4200,#C89A18,#FFD700,#E8C030,#C89A18,#6a4200);
  border:2px solid #FFD700;border-radius:11px;
  color:#060E22;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;
  animation:pulseBtn 1.9s ease-in-out infinite}
.btn-send:disabled{background:rgba(70,70,70,.35);border-color:rgba(255,255,255,.1);
  color:rgba(255,255,255,.22);cursor:not-allowed;animation:none}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.8)}55%{box-shadow:0 0 0 14px rgba(255,215,0,0)}}

/* SCREEN 2 — COIN ANIMATION */
#screen-coin{background:radial-gradient(ellipse at 50% 0%,#1a3a7a 0%,#0D1B3D 42%,#060E22 100%)}
#coin-anim{width:100px;height:100px;margin:0 auto 1.5rem;filter:drop-shadow(0 0 20px rgba(200,150,30,.9));animation:coinSpin 1.5s ease-in-out forwards}
@keyframes coinSpin{0%{transform:scale(1) translateY(0);opacity:1}60%{transform:scale(.8) translateY(60px);opacity:.8}100%{transform:scale(.1) translateY(200px);opacity:0}}
.coin-text{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(212,175,55,.8);animation:shimmer 1s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}

/* SCREEN 3 — GRANTED */
#screen-granted{}
.granted-seal{width:110px;height:110px;border-radius:50%;overflow:hidden;background:#1a1008;
  box-shadow:0 0 0 3px rgba(200,154,24,.7),0 0 40px rgba(255,215,0,.9),0 0 80px rgba(212,175,55,.5);
  margin:0 auto 1.2rem;animation:logoFloat 3s ease-in-out infinite}
.granted-seal img{width:100%;height:100%;object-fit:cover;filter:brightness(1.12) saturate(1.15)}
.stars-row{font-size:2.5rem;margin-bottom:.8rem;filter:drop-shadow(0 0 16px rgba(255,215,0,.8));animation:logoFloat 2s ease-in-out infinite}
.granted-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,4vw,2rem);font-weight:900;
  background:linear-gradient(180deg,#fff9d0,#FFD700,#B88A10);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.6rem;line-height:1.3}
.granted-sub{font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.4rem);font-weight:700;
  color:#FFD700;margin-bottom:1.2rem;letter-spacing:1px}
.granted-msg{color:rgba(255,255,255,.72);font-style:italic;font-size:clamp(.9rem,2.5vw,1.05rem);
  line-height:1.8;margin-bottom:1.8rem;max-width:460px}
.granted-name{color:#FFD700;font-weight:700;font-style:normal}
.btn-back{display:inline-block;padding:.8rem 2rem;
  background:transparent;border:1.5px solid rgba(212,175,55,.5);border-radius:11px;
  color:rgba(212,175,55,.85);font-family:'Cinzel',serif;font-size:.78rem;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-decoration:none;
  transition:all .25s}
.btn-back:hover{border-color:#FFD700;color:#FFD700}
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:200;animation:pFly 1.4s ease-out forwards}
@keyframes pFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:var(--tp) scale(.1)}}
</style>
</head>
<body>
<div id="flash"></div>
<div id="top-border"></div>
<canvas id="stars"></canvas>

<!-- ══ SCREEN 1: WISH FORM ══ -->
<div class="screen active" id="screen-form">
  <div class="form-logo">
    <img src="LOGO.png" alt="6-7 WISH">
  </div>
  <h1 class="form-title">Your Payment Was Successful!</h1>
  <p class="form-sub">Now write your wish. The well is ready to receive it.</p>

  <div class="form-box">
    <label class="field-label">Your name</label>
    <input type="text" class="field-input" id="wish-name"
      placeholder="Enter your name…" maxlength="60" oninput="checkForm()">

    <label class="field-label">Write your secret wish</label>
    <textarea class="field-input" id="wish-text" rows="5"
      placeholder="Write your deepest desire… the well is listening."
      maxlength="300" oninput="checkForm();updateCount()"></textarea>
    <div class="char-count" id="char-count">0/300</div>

    <button class="btn-send" id="btn-send" disabled onclick="sendWish()">
      ✦ Send My Wish ✦
    </button>
  </div>
</div>

<!-- ══ SCREEN 2: COIN ANIMATION ══ -->
<div class="screen" id="screen-coin">
  <div id="coin-anim">
    <svg viewBox="0 0 110 110" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="cf" cx="38%" cy="32%" r="66%">
          <stop offset="0%"   stop-color="#a09060"/><stop offset="38%"  stop-color="#5a4c28"/>
          <stop offset="78%"  stop-color="#382c0e"/><stop offset="100%" stop-color="#241c06"/>
        </radialGradient>
        <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f0d060"/><stop offset="40%"  stop-color="#c89020"/>
          <stop offset="100%" stop-color="#8a5c08"/>
        </linearGradient>
        <linearGradient id="cr" x1="10%" y1="10%" x2="90%" y2="90%">
          <stop offset="0%" stop-color="#c09838"/><stop offset="100%" stop-color="#5a4808"/>
        </linearGradient>
        <clipPath id="cc"><circle cx="55" cy="55" r="50"/></clipPath>
        <path id="ca" d="M55,55 m-38,0 a38,38 0 0,1 76,0"/>
      </defs>
      <circle cx="55" cy="55" r="52" fill="#1a1006"/>
      <circle cx="55" cy="55" r="50" fill="url(#cr)"/>
      <circle cx="55" cy="55" r="47" fill="#160e04"/>
      <circle cx="55" cy="55" r="46" fill="url(#cf)" clip-path="url(#cc)"/>
      <circle cx="55" cy="55" r="40" fill="none" stroke="url(#cg)" stroke-width="3.5"/>
      <text font-family="Arial Black,serif" font-size="9.5" font-weight="900" fill="url(#cg)" letter-spacing="3.5" clip-path="url(#cc)">
        <textPath href="#ca" startOffset="4%">6-7  WISH</textPath>
      </text>
      <text x="55" y="62" font-family="Arial Black,serif" font-size="13" font-weight="900" fill="url(#cg)" text-anchor="middle">COIN</text>
      <circle cx="28" cy="55" r="3.5" fill="url(#cg)"/>
      <circle cx="82" cy="55" r="3.5" fill="url(#cg)"/>
    </svg>
  </div>
  <p class="coin-text">✦ Casting your wish into the well… ✦</p>
</div>

<!-- ══ SCREEN 3: GRANTED ══ -->
<div class="screen" id="screen-granted">
  <div class="granted-seal">
    <img src="LOGO.png" alt="6-7 WISH">
  </div>
  <div class="stars-row">⭐✨⭐</div>
  <h2 class="granted-title">Your wish will come true soon</h2>
  <p class="granted-sub">Your wish has been granted ✦</p>
  <p class="granted-msg" id="granted-msg">
    Your wish has been cast into the waters of possibility.<br>
    The well has heard you. ✦
  </p>
  <a href="/" class="btn-back">← Cast Another Wish</a>
</div>

<script>
// STARS
(function(){
  var c=document.getElementById('stars'),ctx=c.getContext('2d'),stars=[];
  function init(){c.width=innerWidth;c.height=innerHeight;stars=[];for(var i=0;i<160;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.4,t:Math.random()*Math.PI*2,s:Math.random()*.02+.008});}
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(function(s){s.t+=s.s;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(212,175,55,'+(Math.sin(s.t)*.4+.55)+')';ctx.fill();});requestAnimationFrame(draw);}
  addEventListener('resize',init);init();draw();
})();

// FORM
function checkForm(){
  var n=document.getElementById('wish-name').value.trim();
  var w=document.getElementById('wish-text').value.trim();
  var btn=document.getElementById('btn-send');
  btn.disabled=!(n.length>1&&w.length>3);
}
function updateCount(){
  var v=document.getElementById('wish-text').value;
  document.getElementById('char-count').textContent=v.length+'/300';
}

// SEND WISH → animate → granted
function sendWish(){
  var name=document.getElementById('wish-name').value.trim();
  var wish=document.getElementById('wish-text').value.trim();
  var params=new URLSearchParams(window.location.search);

  // Save to backend (non-blocking)
  var fd=new FormData();
  fd.append('first_name',name.split(' ')[0]||name);
  fd.append('last_name',name.split(' ').slice(1).join(' ')||'');
  fd.append('wish_text',wish);
  fd.append('paypal_transaction_id',params.get('txn')||'');
  fd.append('wish_level',params.get('level')||'');
  fd.append('amount',params.get('amount')||'');
  fetch('/api/save-wish.php',{method:'POST',body:fd}).catch(function(){});

  // Show coin animation screen
  showScreen('screen-coin');

  // After coin animation completes → show granted
  setTimeout(function(){
    // Flash
    var fl=document.getElementById('flash');
    fl.style.transition='opacity .1s';fl.style.opacity='1';
    setTimeout(function(){fl.style.transition='opacity .8s';fl.style.opacity='0';},150);
    // Particles
    doParticles();
    // Set granted message with name
    document.getElementById('granted-msg').innerHTML=
      'Your wish has been cast into the waters of possibility,<br>'+
      '<span class="granted-name">'+escHtml(name)+'</span>. The well has heard you. ✦';
    // Show granted screen
    showScreen('screen-granted');
  }, 2200);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

function doParticles(){
  for(var i=0;i<30;i++){
    (function(i){
      var el=document.createElement('div');
      el.className='particle';
      var a=(i/30)*Math.PI*2,d=60+Math.random()*100,s=3+Math.random()*6;
      var col=Math.random()>.45?'#FFD700':'#60d4ff';
      el.style.cssText='width:'+s+'px;height:'+s+'px;background:'+col+';box-shadow:0 0 '+(s*2)+'px '+col+';left:50%;top:45%;--tp:translate('+Math.cos(a)*d+'px,'+Math.sin(a)*d+'px);';
      document.body.appendChild(el);
      setTimeout(function(){el.remove();},1500);
    })(i);
  }
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
